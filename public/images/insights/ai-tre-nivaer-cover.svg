<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="cover-title cover-desc">
  <title id="cover-title">AI i tre nivåer — abstrakt visualisering</title>
  <desc id="cover-desc">Tre färgade band staplade ovanpå varandra som representerar nivå 1 automation, nivå 2 augmentation och nivå 3 konsultation. Färgkodning matchar trilogins övriga grafik.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010D60"/>
      <stop offset="50%" stop-color="#1A277A"/>
      <stop offset="100%" stop-color="#010D60"/>
    </linearGradient>
    <linearGradient id="level1Stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D8A6B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2D8A6B" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="level2Stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A4EA9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2A4EA9" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="level3Stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A32D2D" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A32D2D" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="0.7" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#glowGrad)"/>

  <!-- Three diagonal stripes representing the three levels -->
  <!-- Level 3 (top, smallest, most restrictive) -->
  <g transform="translate(0, 140) skewY(-6)">
    <rect x="100" y="0" width="900" height="100" fill="url(#level3Stripe)" rx="4"/>
    <text x="140" y="50" font-family="'Chakra Petch', 'Helvetica Neue', Arial, sans-serif"
          font-size="22" font-weight="700" fill="#FFFFFF" dominant-baseline="middle" letter-spacing="0.04em">NIVÅ 3 — KONSULTATION</text>
    <text x="140" y="78" font-family="'Source Serif 4', Georgia, serif"
          font-size="16" font-style="italic" fill="#FFFFFF" fill-opacity="0.85" dominant-baseline="middle">Strategi · Personal · Varumärke</text>
  </g>

  <!-- Level 2 (middle) -->
  <g transform="translate(0, 320) skewY(-6)">
    <rect x="100" y="0" width="1100" height="100" fill="url(#level2Stripe)" rx="4"/>
    <text x="140" y="50" font-family="'Chakra Petch', 'Helvetica Neue', Arial, sans-serif"
          font-size="26" font-weight="700" fill="#FFFFFF" dominant-baseline="middle" letter-spacing="0.04em">NIVÅ 2 — AUGMENTATION</text>
    <text x="140" y="80" font-family="'Source Serif 4', Georgia, serif"
          font-size="18" font-style="italic" fill="#FFFFFF" fill-opacity="0.85" dominant-baseline="middle">Prognoser · Scheman · Foto-analys · Kampanj-mix</text>
  </g>

  <!-- Level 1 (bottom, broadest, most permissive) -->
  <g transform="translate(0, 540) skewY(-6)">
    <rect x="100" y="0" width="1300" height="100" fill="url(#level1Stripe)" rx="4"/>
    <text x="140" y="50" font-family="'Chakra Petch', 'Helvetica Neue', Arial, sans-serif"
          font-size="30" font-weight="700" fill="#FFFFFF" dominant-baseline="middle" letter-spacing="0.04em">NIVÅ 1 — AUTOMATION</text>
    <text x="140" y="82" font-family="'Source Serif 4', Georgia, serif"
          font-size="20" font-style="italic" fill="#FFFFFF" fill-opacity="0.85" dominant-baseline="middle">ESL-priser · Replenishment · OOS-alerter · Anomalidetektion</text>
  </g>

  <!-- Subtle eyebrow text in corner -->
  <text x="100" y="80" font-family="'Chakra Petch', sans-serif"
        font-size="16" font-weight="600" fill="#90A2CF" letter-spacing="0.12em">AI BORTOM HYPEN · DEL 3 AV 3</text>

  <!-- Subtle footer line -->
  <text x="100" y="830" font-family="'Source Serif 4', Georgia, serif"
        font-size="20" font-style="italic" fill="#FFFFFF" fill-opacity="0.6">Tre nivåer av beslutsmandat. Och hur ni vet vad som hör hemma var.</text>
</svg>
